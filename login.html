<body>
    <div class="login-container signup-login">
        <div class="login-form">
            <h2>LOGIN / join</h2>
            <div class="login-content">
                <div class="tabs2 tabs">
                    <a href="#mobile" clas="active">MOBILE NUMBER</a>
                    <a href="#e-mail">E-MAIL ADDRESS</a>
                    <a href="#password">PASSWORD</a>
                </div>
                <div class="tabs-content" id="mobile">
                    <input type="text"  id="number" placeholder="enter your mobile number">
                    
                </div>
                <div class="tabs-content" id="e-mail">
                    <input type="email"  id="email" placeholder="enter your email">
                </div>
                 <div class="tabs-content" id="password">
                    <input type="password"  id="pass_word" placeholder="Password">
                </div>
            </div>
            <div class="check">
               <input type="checkbox" id="checked">
               <p>By continuing you agree to our <span class="login-span">Terms of Use </span>and<span class="login-span">  Privacy Policy</span></p>
            </div>
            <button class="continue-btn">CONTINUE</button>
        </div>
    </div>
     <div class="login-close">

    </div>
